name: CI - Integration, ESLint Security, Dependency Check, UI Test

on: [push, pull_request]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose up -d --build

      - name: Wait for webapp to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3001/ && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        working-directory: ./webapp
        run: npm install

      - name: Run integration tests
        working-directory: ./webapp
        run: npm run test:integration

      - name: Stop app stack
        if: always()
        run: docker compose down

  eslint-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./webapp
        run: npm install

      - name: Run ESLint security scan
        working-directory: ./webapp
        run: npx eslint . --format=@microsoft/eslint-formatter-sarif --output-file=eslint-results.sarif
        continue-on-error: true

      - name: Upload SARIF report
        uses: actions/upload-artifact@v4
        with:
          name: ESLint-Security-Report
          path: ./webapp/eslint-results.sarif

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "SSD_Practical"
          path: "./webapp"
          format: "HTML"
          out: "dependency-check-report"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report

  ui-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose up -d --build

      - name: Wait for webapp to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3001/ && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install test dependencies
        working-directory: ./webapp
        run: npm install

      - name: Run UI tests (Selenium over HTTP)
        working-directory: ./webapp
        run: npm run test:ui

      - name: Stop app stack
        if: always()
        run: docker compose down
