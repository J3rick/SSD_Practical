services:
  nginxwebsvr:
    image: nginx:alpine
    container_name: nginxwebsvr
    volumes: 
      - ./nginx-selfsigned.crt:/etc/nginx/ssl/nginx-selfsigned.crt:ro
      - ./nginx-selfsigned.key:/etc/nginx/ssl/nginx-selfsigned.key:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "443:443"
      - "80:80"
  git-server:
    build:
      dockerfile: gitserver.Dockerfile
      context: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./repos:/var/www/git
  mysqldb:
    image: mysql:8.0
    restart: always
    volumes:
      - ./mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: testdb
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
  webapp:
    build:
      context: ./webapp
    container_name: webapp
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysqldb
      DB_USER: user
      DB_PASSWORD: pass
      DB_NAME: testdb
    depends_on:
      - mysqldb
